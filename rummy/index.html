<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />

  <title>Rummy Scorecard</title>

  <meta name="theme-color" content="#0a5c2f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Rummy" />

  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png" />
  <link rel="icon" type="image/png" href="./apple-touch-icon.png" />

  <link rel="stylesheet" href="./rummy.css" />
</head>

<body>
  <main class="app-shell">
    <header class="app-header">
      <div>
        <p class="eyebrow">RUMMY</p>
        <h1>Scorecard</h1>
      </div>

      <button id="newGameButton" class="new-game-button" type="button">
        New Game
      </button>
    </header>

    <section class="score-screen">
      <div id="tableScroller" class="table-scroller">
        <table
          id="scoreTable"
          class="score-table"
          aria-label="Rummy scorecard"
        ></table>

        <button
          id="addPlayerButton"
          class="add-player-button"
          type="button"
          aria-label="Add player"
          title="Add player"
        >
          +
        </button>
      </div>

      <button
        id="addRoundButton"
        class="add-round-button"
        type="button"
        aria-label="Add round"
        title="Add round"
      >
        +
      </button>
    </section>
  </main>

  <script src="./rummy.js"></script>
</body>
</html>
