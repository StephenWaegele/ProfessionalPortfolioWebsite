<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />

  <title>Rummy Scorecard</title>

  <meta name="theme-color" content="#0a5c2f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Rummy" />

  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
  <link rel="icon" type="image/png" href="./apple-touch-icon.png" />

  <link rel="stylesheet" href="./rummy.css" />
</head>

<body>
  <main class="app-shell">
    <header class="app-header">
      <div>
        <p class="eyebrow">RUMMY</p>
        <h1>Scorecard</h1>
      </div>

      <button id="newGameButton" class="new-game-button" type="button">
        New Game
      </button>
    </header>

    <section class="score-screen">
      <div id="scoreWorkspace" class="score-workspace">
        <button
          id="addPlayerButton"
          class="side-add-button add-player-button"
          type="button"
          aria-label="Add player"
          title="Add player"
        >
          +
        </button>

        <button
          id="addRoundButton"
          class="side-add-button add-round-button"
          type="button"
          aria-label="Add round"
          title="Add round"
        >
          +
        </button>

        <div id="tableScroller" class="table-scroller">
          <table
            id="scoreTable"
            class="score-table"
            aria-label="Rummy scorecard"
          ></table>
        </div>
      </div>
    </section>
  </main>

  <div id="actionModal" class="action-modal hidden" role="dialog" aria-modal="true">
    <div class="action-modal-backdrop" data-close-modal></div>

    <section class="action-dialog" aria-labelledby="actionModalTitle">
      <p id="actionModalType" class="action-modal-type"></p>
      <h2 id="actionModalTitle">Manage</h2>

      <button id="renameActionButton" class="action-button" type="button">
        Rename
      </button>

      <button id="deleteActionButton" class="action-button delete-action" type="button">
        Delete
      </button>

      <button id="cancelActionButton" class="action-button cancel-action" type="button">
        Cancel
      </button>
    </section>
  </div>

  <script src="./rummy.js"></script>
</body>
</html>
